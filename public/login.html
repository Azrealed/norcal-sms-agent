<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NorCal SMS Agent - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .login-box { background: #1e293b; padding: 2.5rem; border-radius: 12px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    h1 { font-size: 1.5rem; margin-bottom: .5rem; }
    .subtitle { color: #94a3b8; margin-bottom: 1.5rem; font-size: .9rem; }
    .input-group { margin-bottom: 1rem; }
    .input-group label { display: block; font-size: .8rem; color: #94a3b8; margin-bottom: 4px; }
    .input-group input { width: 100%; padding: .75rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 1rem; -webkit-appearance: none; }
    .input-group input:focus { outline: none; border-color: #22c55e; }

    /* Remember Me Checkbox */
    .remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; cursor: pointer; user-select: none; }
    .remember-row input[type="checkbox"] { display: none; }
    .check-box { width: 20px; height: 20px; border: 2px solid #475569; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
    .remember-row input:checked + .check-box { background: #22c55e; border-color: #22c55e; }
    .check-box::after { content: '✓'; color: #fff; font-size: 13px; font-weight: bold; opacity: 0; transition: opacity .15s; }
    .remember-row input:checked + .check-box::after { opacity: 1; }
    .remember-label { font-size: .85rem; color: #94a3b8; }

    button { width: 100%; padding: .75rem; background: #22c55e; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; -webkit-appearance: none; }
    button:hover { background: #16a34a; }
    button:active { transform: scale(0.98); }
    .error { color: #ef4444; font-size: .85rem; margin-top: .5rem; display: none; }
    .footer-text { text-align: center; font-size: .7rem; color: #475569; margin-top: 1.5rem; }

    @media (max-width: 480px) {
      .login-box { padding: 1.5rem; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>📋 NorCal SMS Agent</h1>
    <p class="subtitle">Enter the dashboard password to continue</p>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Dashboard password" autocomplete="current-password" autofocus>
    </div>
    <label class="remember-row">
      <input type="checkbox" id="remember-me">
      <span class="check-box"></span>
      <span class="remember-label">Remember me for 30 days</span>
    </label>
    <button onclick="login()">Sign In</button>
    <div class="error" id="error">Invalid password</div>
    <div class="footer-text">NorCal Home Offer &bull; AI SMS Agent</div>
  </div>
  <script>
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    // Focus and show keyboard on mobile
    document.getElementById('password').focus();

    async function login() {
      const pw = document.getElementById('password').value;
      const rememberMe = document.getElementById('remember-me').checked;
      const res = await fetch('/api/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({password: pw, rememberMe})
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }
  </script>
</body>
</html>
